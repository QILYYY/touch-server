<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прикосновения Ультра 4.0 💫</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; user-select: none; }
        
        body {
            margin: 0; padding: 10px; height: 100vh;
            color: #fff; display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; transition: background-color 0.3s, color 0.3s;
        }

        /* Цветовые схемы (Темы) */
        body.theme-dark { background-color: #0b0b0e; --panel-bg: #15151f; --accent: #ff3366; --border: #232336; }
        body.theme-cyber { background-color: #050515; --panel-bg: #0b0b26; --accent: #00f0ff; --border: #00ff66; }
        body.theme-pastel { background-color: #1a1525; --panel-bg: #2d223c; --accent: #ff758f; --border: #7209b7; }

        /* Вспышки фонов */
        body.touch-tap { background-color: rgba(0, 180, 216, 0.2) !important; }
        body.touch-heartbeat { background-color: rgba(255, 77, 109, 0.2) !important; }
        body.touch-hug { background-color: rgba(114, 9, 183, 0.2) !important; }
        body.touch-kiss { background-color: rgba(255, 117, 143, 0.2) !important; }
        body.combo-active { background-color: rgba(56, 176, 0, 0.3) !important; }

        /* Шапка */
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 5px 8px 5px; border-bottom: 1px solid var(--border); }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem;
            background: var(--panel-bg); padding: 4px 12px; border-radius: 20px; color: #888;
        }
        .status-badge.online { color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .status-badge .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .status-badge.online .dot { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

        .menu-toggle-btn {
            background: var(--panel-bg); border: 1px solid var(--border);
            color: #fff; font-size: 1.1rem; padding: 6px 12px; border-radius: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .menu-toggle-btn:active { transform: scale(0.92); border-color: var(--accent); }

        /* Игровая зона */
        .interactive-zone {
            position: relative; flex-grow: 1; margin: 10px 0;
            background: linear-gradient(145deg, rgba(20,20,30,0.4), rgba(10,10,15,0.4));
            border: 2px dashed var(--border); border-radius: 24px; overflow: hidden;
        }
        #touch-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; touch-action: none; }
        
        #combo-trigger-btn {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: var(--accent); border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; font-size: 0.85rem; color: white;
            box-shadow: 0 0 15px var(--accent); display: none; animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.06); } 100% { transform: translateX(-50%) scale(1); } }

        /* Анимация оверлея эмодзи */
        #emoji-anim-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 6rem; z-index: 999; pointer-events: none; opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4);
        }
        #emoji-anim-overlay.pop { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(10deg); }

        /* Кнопки режимов */
        .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 4px; }
        .mode-btn { background: var(--panel-bg); border: 1px solid var(--border); color: #a0a0b0; padding: 11px 4px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; }
        .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: bold; }
        .mode-btn.special { background: #7209b7; color: #fff; border-color: #7209b7; }

        #touch-overlay {
            position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 15, 25, 0.95); border: 2px solid var(--accent); padding: 12px 22px;
            border-radius: 20px; font-size: 1.1rem; font-weight: bold; text-align: center;
            z-index: 9999; pointer-events: none; opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #touch-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #rhythm-overlay {
            position: fixed; inset: 0; background: rgba(11, 11, 14, 0.95);
            z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        .rhythm-pad { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #7209b7, #3f076b); display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid var(--accent); }

        /* ВСПЛЫВАЮЩЕЕ МЕНЮ */
        #native-menu-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 50000; display: none; align-items: flex-end; justify-content: center;
        }
        .menu-sheet {
            width: 100%; max-width: 450px; background: #12121a; border-top: 2px solid var(--border);
            border-radius: 24px 24px 0 0; padding: 24px; display: flex; flex-direction: column; gap: 20px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #native-menu-overlay.open .menu-sheet { transform: translateY(0); }
        
        .menu-section { display: flex; flex-direction: column; gap: 8px; }
        .menu-section-title { font-size: 0.85rem; color: #666677; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .score-box { background: rgba(255,255,255,0.03); border: 1px dashed var(--border); padding: 14px; border-radius: 16px; text-align: center; font-weight: bold; color: var(--accent); font-size: 1.05rem; }
        .status-bar { display: flex; gap: 8px; justify-content: space-between; }
        .status-bubble { flex: 1; background: #1a1a26; border: 1px solid #2a2a3a; padding: 10px 5px; text-align: center; border-radius: 12px; font-size: 0.8rem; cursor: pointer; }
        .status-bubble.active { border-color: var(--accent); background: rgba(255,51,102,0.1); font-weight: bold; }
        
        .emoji-bar { display: flex; justify-content: space-around; background: #1a1a26; padding: 10px; border-radius: 14px; gap: 5px; }
        .emoji-btn { font-size: 1.6rem; background: none; border: none; cursor: pointer; transition: transform 0.1s; }
        .emoji-btn:active { transform: scale(1.25); }

        .theme-selector { display: flex; gap: 12px; background: #1a1a26; padding: 12px; border-radius: 14px; justify-content: center; }
        .theme-opt { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; background: #12121a; padding: 6px 12px; border-radius: 10px; border: 1px solid #2d2d3f; }
        .theme-opt.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }
        
        .close-menu-btn { background: var(--accent); border: none; color: #fff; padding: 12px; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 5px; text-align: center; }

        /* Экран авторизации */
        #pairing-screen { position: fixed; inset: 0; background: #0b0b0e; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 20px; }
        #pairing-screen h2 { margin: 0; font-weight: 800; color: #fff; }
        #pairing-screen .input-field { width: 100%; max-width: 280px; background: #15151f; border: 1px solid #2d2d3f; padding: 14px; border-radius: 14px; color: #fff; text-align: center; font-size: 1.1rem; outline: none; }
        #pairing-screen .primary-btn { width: 100%; max-width: 280px; background: linear-gradient(135deg, #ff3366, #ff5588); border: none; padding: 14px; border-radius: 14px; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3); }
    </style>
</head>
<body class="theme-dark">

    <div id="touch-overlay"></div>

    <div id="rhythm-overlay">
        <div class="rhythm-pad">СТУЧИ СЮДА</div>
        <p style="color: #888; font-size: 0.85rem; text-align: center; max-width: 250px;">Отстукивай ритм пальцем по кругу!</p>
    </div>

    <div id="pairing-screen">
        <h2>Прикосновения Ультра 💫</h2>
        <p style="color: #555566; font-size: 0.85rem; margin: 0;">Введите или создайте код комнаты</p>
        <input type="text" id="room-input" class="input-field" placeholder="Код комнаты">
        <button id="connect-btn" class="primary-btn">Войти в систему</button>
    </div>

    <header>
        <div>
            <div id="status-badge" class="status-badge"><div class="dot"></div> <span id="status-text">Поиск...</span></div>
            <span id="partner-status" style="font-size: 0.75rem; color: #666; margin-left: 8px;">Партнер: --</span>
        </div>
        <button class="menu-toggle-btn" id="open-menu-btn">⚙️ Меню</button>
    </header>

    <div class="interactive-zone" id="zone">
        <div id="emoji-anim-overlay">❤️</div>
        <button id="combo-trigger-btn">ПОЙМАТЬ КАСАНИЕ 🤝</button>
        <canvas id="touch-canvas"></canvas>
    </div>

    <div id="native-menu-overlay">
        <div class="menu-sheet">
            <h3 style="margin: 0; text-align: center; font-size: 1.1rem; letter-spacing: 0.5px;">Пространство Пары ✨</h3>
            
            <div class="score-box" id="score-display">Уровень связи: 1 (0 Комбо) ❤️</div>

            <div class="menu-section">
                <div class="menu-section-title">Отправить быструю реакцию</div>
                <div class="emoji-bar">
                    <button class="emoji-btn" data-emoji="❤️">❤️</button>
                    <button class="emoji-btn" data-emoji="🔥">🔥</button>
                    <button class="emoji-btn" data-emoji="😘">😘</button>
                    <button class="emoji-btn" data-emoji="🎉">🎉</button>
                    <button class="emoji-btn" data-emoji="✨">✨</button>
                    <button class="emoji-btn" data-emoji="💩">💩</button>
                </div>
            </div>

            <div class="menu-section">
                <div class="menu-section-title">Моё состояние</div>
                <div class="status-bar">
                    <div class="status-bubble" data-status="⏳ Занят(а)">⏳ Занят</div>
                    <div class="status-bubble" data-status="💔 Скучаю">💔 Скучаю</div>
                    <div class="status-bubble" data-status="☕ Отдыхаю">☕ Отдыхаю</div>
                </div>
            </div>

            <div class="menu-section">
                <div class="menu-section-title">Оформление комнат</div>
                <div class="theme-selector">
                    <div class="theme-opt active" id="th-dark" onclick="changeTheme('dark', true)">🖤 Тёмная</div>
                    <div class="theme-opt" id="th-cyber" onclick="changeTheme('cyber', true)">🧪 Киберпанк</div>
                    <div class="theme-opt" id="th-pastel" onclick="changeTheme('pastel', true)">🌸 Пастель</div>
                </div>
            </div>

            <button class="close-menu-btn" id="close-menu-btn">Закрыть</button>
        </div>
    </div>

    <div class="modes">
        <button class="mode-btn active" data-mode="tap">Тап ⚡</button>
        <button class="mode-btn" data-mode="heartbeat">Пульс ❤️</button>
        <button class="mode-btn" data-mode="hug">Объятие 🫂</button>
        <button class="mode-btn" data-mode="kiss">Поцелуй 💋</button>
        <button class="mode-btn" data-mode="draw">Рисование 🎨</button>
        <button class="mode-btn special" id="rhythm-btn">Запись Ритма 🥁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const ws = new WebSocket('wss://my-touch-app.onrender.com');

        const menuOverlay = document.getElementById('native-menu-overlay');
        const openMenuBtn = document.getElementById('open-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const pairingScreen = document.getElementById('pairing-screen');
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const canvas = document.getElementById('touch-canvas');
        const ctx = canvas.getContext('2d');
        const comboBtn = document.getElementById('combo-trigger-btn');
        const touchOverlay = document.getElementById('touch-overlay');
        const rhythmBtn = document.getElementById('rhythm-btn');
        const rhythmOverlay = document.getElementById('rhythm-overlay');
        const rhythmPad = document.querySelector('.rhythm-pad');
        const scoreDisplay = document.getElementById('score-display');
        const partnerStatusEl = document.getElementById('partner-status');
        const emojiOverlay = document.getElementById('emoji-anim-overlay');

        let currentMode = 'tap';
        let isDrawing = false;
        let comboActiveByPartner = false;
        let comboTimeout = null;
        let particles = [];
        let isRecordingRhythm = false;
        let rhythmStartTime = 0;
        let recordedTaps = [];

        let comboScore = parseInt(localStorage.getItem('touch_combo_score') || '0');

        const overlayTexts = {
            tap: "Тык! ⚡", heartbeat: "Стук сердца... ❤️",
            hug: "Вас нежно обняли! 🫂", kiss: "Сладкий поцелуй! 💋",
            combo: "ИДЕАЛЬНОЕ СОВПАДЕНИЕ! 💚🌟", custom: "Вам прислали личный ритм! 🥁"
        };

        openMenuBtn.addEventListener('click', () => {
            menuOverlay.style.display = 'flex';
            setTimeout(() => menuOverlay.classList.add('open'), 10);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        closeMenuBtn.addEventListener('click', () => {
            menuOverlay.classList.remove('open');
            setTimeout(() => menuOverlay.style.display = 'none', 300);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        menuOverlay.addEventListener('click', (e) => { if (e.target === menuOverlay) closeMenuBtn.click(); });

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        updateScoreUI();
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            roomInput.value = decodeURIComponent(tg.initDataUnsafe.start_param);
            ws.onopen = () => startApp(roomInput.value.trim());
        } else {
            const savedRoom = localStorage.getItem('tg_room_code_v3');
            if (savedRoom) roomInput.value = savedRoom;
        }

        connectBtn.addEventListener('click', () => {
            const code = roomInput.value.trim();
            if (!code) return alert('Введите код!');
            startApp(code);
        });

        function startApp(roomCode) {
            localStorage.setItem('tg_room_code_v3', roomCode);
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'join', room: roomCode }));
            pairingScreen.style.display = 'none';
            resizeCanvas();
        }

        function changeTheme(themeName, sendNet = false) {
            document.body.className = '';
            document.body.classList.add('theme-' + themeName);
            document.querySelectorAll('.theme-opt').forEach(opt => opt.classList.remove('active'));
            const currentOpt = document.getElementById('th-' + themeName);
            if (currentOpt) currentOpt.classList.add('active');
            if (sendNet) sendNetData({ type: 'change_theme', theme: themeName });
        }

        function updateScoreUI() {
            let level = Math.floor(comboScore / 5) + 1;
            scoreDisplay.textContent = `Уровень связи: ${level} (${comboScore} Комбо) ❤️`;
            localStorage.setItem('touch_combo_score', comboScore);
        }

        // ================= УЛЬТИМАТИВНЫЙ ДВИЖОК КОМБИНИРОВАННЫХ ЧАСТИЦ =================
        class Particle {
            constructor(x, y, actionType, customChar = '') {
                this.x = x;
                this.y = y;
                this.type = actionType; // 'tap', 'heartbeat', 'hug', 'kiss', 'draw', 'emoji', 'combo'
                this.char = customChar;
                this.alpha = 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;

                // Настройки физики в зависимости от режима
                if (this.type === 'tap') {
                    this.size = Math.random() * 3 + 4;
                    this.speedX = (Math.random() - 0.5) * 10; // Быстрый разлет
                    this.speedY = (Math.random() - 0.5) * 10;
                    this.decay = Math.random() * 0.03 + 0.02;
                    this.color = Math.random() > 0.4 ? '#00b4d8' : '#ffb703'; // Синие и желтые искры
                } 
                else if (this.type === 'heartbeat') {
                    this.size = Math.random() * 10 + 10; // Большие круги
                    this.speedX = (Math.random() - 0.5) * 2; // Медленно расширяются
                    this.speedY = (Math.random() - 0.5) * 2;
                    this.decay = 0.015;
                    this.color = `css_var`; // Берется из темы или красный
                } 
                else if (this.type === 'hug') {
                    this.size = Math.random() * 6 + 8;
                    this.speedX = (Math.random() - 0.5) * 3;
                    this.speedY = (Math.random() - 0.5) * 3;
                    this.decay = 0.01; // Долго угасают
                    this.color = Math.random() > 0.5 ? '#7209b7' : '#b5179e'; // Фиолетово-розовые облака
                } 
                else if (this.type === 'kiss') {
                    this.size = Math.random() * 8 + 10;
                    this.speedX = (Math.random() - 0.5) * 5;
                    this.speedY = (Math.random() - 0.3) * 6 - 2; // Летят немного вверх
                    this.decay = 0.015;
                    this.color = '#ff758f';
                } 
                else if (this.type === 'draw') {
                    this.size = Math.random() * 5 + 6;
                    this.speedX = (Math.random() - 0.5) * 2;
                    this.speedY = (Math.random() - 0.5) * 2;
                    this.decay = 0.03;
                    // Радужные переливы для рисования
                    const hues = [0, 45, 180, 280, 320];
                    this.color = `hsl(${hues[Math.floor(Math.random() * hues.length)]}, 100%, 65%)`;
                } 
                else if (this.type === 'combo') {
                    this.size = Math.random() * 6 + 6;
                    this.speedX = (Math.random() - 0.5) * 12;
                    this.speedY = (Math.random() - 0.5) * 12;
                    this.decay = 0.01;
                    this.color = '#38b000'; // Ярко-зеленый салют
                }
                else if (this.type === 'emoji') {
                    this.size = Math.random() * 14 + 14;
                    this.speedX = (Math.random() - 0.5) * 9;
                    this.speedY = (Math.random() - 0.5) * 9;
                    this.decay = 0.012;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                this.rotation += this.rotationSpeed;
                if (this.type === 'heartbeat') this.size += 0.4; // Эффект расширения волны пульса
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                if (this.type === 'emoji') {
                    ctx.font = `${this.size}px serif`;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.fillText(this.char, -this.size/2, this.size/2);
                } 
                else if (this.type === 'kiss') {
                    // Отрисовка маленьких сердечек для поцелуя
                    ctx.fillStyle = this.color;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * 0.2);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
                    ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
                    ctx.fill();
                }
                else if (this.type === 'tap') {
                    // Отрисовка искр ромбиками / молниями
                    ctx.fillStyle = this.color;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size/2, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size/2, 0);
                    ctx.closePath();
                    ctx.fill();
                }
                else {
                    // Круги для пульса, объятий, комбо и рисования
                    ctx.fillStyle = this.color === 'css_var' ? (getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#ff3366') : this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function createParticlesEffect(x, y, type, char = '') {
            let count = 15;
            if (type === 'emoji') count = 25;
            if (type === 'combo') count = 35;
            if (type === 'draw') count = 2; // Меньше частиц, чтобы холст не забивался при движении
            
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, type, char));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ================= ЛОГИКА АНИМАЦИИ ЭМОДЗИ =================
        function playEmojiAnimation(emoji) {
            emojiOverlay.textContent = emoji;
            emojiOverlay.classList.add('pop');
            
            setTimeout(() => {
                createParticlesEffect(canvas.width / 2, canvas.height / 2, 'emoji', emoji);
            }, 120);

            setTimeout(() => emojiOverlay.classList.remove('pop'), 600);
        }

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const emoji = btn.dataset.emoji;
                sendNetData({ type: 'send_emoji', emoji: emoji });
                playEmojiAnimation(emoji);
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            });
        });

        // ================= НАДЁЖНЫЙ ХАРДВЕРНЫЙ ОТКЛИК =================
        function triggerHaptic(mode) {
            if (!tg || !tg.HapticFeedback) return;
            try {
                if (mode === 'tap') {
                    tg.HapticFeedback.impactOccurred('heavy');
                    tg.HapticFeedback.impactOccurred('rigid');
                } else if (mode === 'heartbeat') {
                    tg.HapticFeedback.notificationOccurred('warning');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning'); }, 180);
                } else if (mode === 'hug') {
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (mode === 'kiss') {
                    tg.HapticFeedback.impactOccurred('heavy');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }, 80);
                } else if (mode === 'combo') {
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (mode === 'emoji_heart') {
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (mode === 'emoji_fire') {
                    tg.HapticFeedback.notificationOccurred('error');
                } else if (mode === 'draw_vibe') {
                    tg.HapticFeedback.impactOccurred('soft');
                }
            } catch(e) {}
        }

        function showOverlay(type) {
            if (overlayTexts[type]) {
                touchOverlay.textContent = overlayTexts[type];
                touchOverlay.classList.add('show');
                setTimeout(() => touchOverlay.classList.remove('show'), 1400);
            }
        }

        // ================= КАСАНИЯ И КООРДИНАТЫ =================
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;

            if (currentMode === 'draw') {
                isDrawing = true;
                sendNetData({ type: 'draw_start', x, y });
            } else {
                sendNetData({ type: 'touch', pattern: currentMode, x, y });
                createParticlesEffect(x, y, currentMode);
                sendNetData({ type: 'combo_window_open' });
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing || currentMode !== 'draw') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;

            sendNetData({ type: 'draw_move', x, y });
            createParticlesEffect(x, y, 'draw');
            triggerHaptic('draw_vibe');
        });

        canvas.addEventListener('pointerup', () => { isDrawing = false; });

        document.querySelectorAll('.status-bubble').forEach(el => {
            el.addEventListener('click', () => {
                const alreadyActive = el.classList.contains('active');
                document.querySelectorAll('.status-bubble').forEach(b => b.classList.remove('active'));
                let currentStatus = "Обычное";
                if (!alreadyActive) {
                    el.classList.add('active');
                    currentStatus = el.dataset.status;
                }
                sendNetData({ type: 'change_status', status: currentStatus });
            });
        });

        comboBtn.addEventListener('click', () => {
            if (comboActiveByPartner) {
                sendNetData({ type: 'combo_match_success' });
                handleComboSuccess();
            }
        });

        function handleComboSuccess() {
            comboBtn.style.display = 'none'; comboActiveByPartner = false;
            document.body.classList.add('combo-active');
            showOverlay('combo'); triggerHaptic('combo');
            
            // Запуск мощного зеленого салюта на весь холст!
            createParticlesEffect(canvas.width / 2, canvas.height / 2, 'combo');
            
            comboScore++; updateScoreUI();
            setTimeout(() => document.body.classList.remove('combo-active'), 1500);
        }

        // РИТМЫ
        rhythmBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            isRecordingRhythm = true; rhythmStartTime = Date.now(); recordedTaps = [];
            rhythmBtn.textContent = "🔴 Запись..."; rhythmOverlay.style.display = 'flex';
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        rhythmPad.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (!isRecordingRhythm) return;
            recordedTaps.push(Date.now() - rhythmStartTime);
            triggerHaptic('tap');
        });

        rhythmBtn.addEventListener('pointerup', (e) => {
            e.preventDefault(); if (!isRecordingRhythm) return;
            isRecordingRhythm = false; rhythmBtn.textContent = "Запись Ритма 🥁"; rhythmOverlay.style.display = 'none';
            if (recordedTaps.length > 0) sendNetData({ type: 'custom_rhythm', taps: recordedTaps });
        });

        // ================= СЕТЕВЫЕ СИГНАЛЫ =================
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'system_status') {
                if (data.text.includes('2')) {
                    badge.classList.add('online'); statusText.textContent = 'В сети';
                } else {
                    badge.classList.remove('online'); statusText.textContent = 'Поиск...';
                }
            } 
            else if (data.type === 'send_emoji') {
                playEmojiAnimation(data.emoji);
                if (data.emoji === '❤️' || data.emoji === '😘') triggerHaptic('emoji_heart');
                else if (data.emoji === '🔥' || data.emoji === '🎉') triggerHaptic('emoji_fire');
                else triggerHaptic('tap');
            }
            else if (data.type === 'touch') {
                triggerHaptic(data.pattern); showOverlay(data.pattern);
                createParticlesEffect(data.x || canvas.width/2, data.y || canvas.height/2, data.pattern);
                document.body.classList.add("touch-" + data.pattern);
                setTimeout(() => document.body.classList.remove("touch-" + data.pattern), 500);
            }
            else if (data.type === 'draw_start' || data.type === 'draw_move') {
                createParticlesEffect(data.x, data.y, 'draw');
                triggerHaptic('draw_vibe');
            }
            else if (data.type === 'combo_window_open') {
                comboActiveByPartner = true; comboBtn.style.display = 'block';
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => { comboBtn.style.display = 'none'; comboActiveByPartner = false; }, 1500);
            } 
            else if (data.type === 'combo_match_success') { handleComboSuccess(); }
            else if (data.type === 'custom_rhythm') {
                showOverlay('custom');
                data.taps.forEach(delay => {
                    setTimeout(() => { triggerHaptic('tap'); createParticlesEffect(canvas.width/2, canvas.height/2, 'tap'); }, delay);
                });
            }
            else if (data.type === 'change_theme') { changeTheme(data.theme, false); }
            else if (data.type === 'change_status') { partnerStatusEl.textContent = `Партнер: ${data.status}`; }
        };

        document.querySelectorAll('.mode-btn:not(.special)').forEach(btn => {
            btn.addEventListener('click', () => {
                const activeBtn = document.querySelector('.mode-btn.active');
                if (activeBtn) activeBtn.classList.remove('active');
                btn.classList.add('active'); currentMode = btn.dataset.mode;
            });
        });

        function sendNetData(obj) { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }
    </script>
</body>
</html>
