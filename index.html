<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватные прикосновения</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            margin: 0; padding: 15px; height: 100vh;
            background-color: #121212; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; transition: background-color 0.3s;
        }

        /* Цветовые вспышки для касаний */
        body.touch-tap { background-color: #00bcd4; }
        body.touch-heartbeat { background-color: #e91e63; }
        body.touch-hug { background-color: #ff9800; }

        /* ЭКРАН 1: Авторизация/Сопряжение */
        #pairing-screen {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            text-align: center; width: 100%; max-width: 320px;
        }
        .input-field {
            width: 100%; background: #222; border: 1px solid #444; padding: 12px;
            border-radius: 8px; color: #fff; text-align: center; font-size: 1.1rem; outline: none;
        }
        .primary-btn {
            width: 100%; background: #ff3366; border: none; padding: 12px;
            border-radius: 8px; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        /* ЭКРАН 2: Главное приложение (скрыто по умолчанию) */
        #app-screen {
            display: none; flex-direction: column; justify-content: space-between;
            width: 100%; height: 100%;
        }

        header { text-align: center; padding: 5px 0; }
        #status { font-size: 0.8rem; color: #888; margin-top: 5px; }

        .touch-section { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #touch-pad {
            width: 150px; height: 150px; border-radius: 50%;
            background: linear-gradient(145deg, #333, #222);
            border: 3px solid #ff3366; display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .modes { display: flex; gap: 8px; }
        .mode-btn {
            background: #222; border: 1px solid #444; color: #aaa; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        .mode-btn.active { background: #ff3366; color: #fff; border-color: #ff3366; font-weight: bold; }

        .chat-section { background: #1e1e1e; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; height: 35vh; }
        #chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; word-break: break-word; font-size: 0.9rem; }
        .msg.me { background: #333; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.partner { background: #ff3366; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-input-area { display: flex; gap: 8px; }
        #chat-input { flex-grow: 1; background: #2a2a2a; border: none; padding: 10px; border-radius: 8px; color: #fff; outline: none; }
        #send-btn { background: #ff3366; border: none; padding: 0 15px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ================= СХЕМА 1: СОПРЯЖЕНИЕ ================= -->
    <div id="pairing-screen">
        <h2>Связь на расстоянии</h2>
        <p style="color: #888; font-size: 0.9rem;">Введите одинаковый секретный код на обоих устройствах, чтобы объединить их</p>
        <input type="text" id="room-input" class="input-field" placeholder="Например: Пара2026" autocomplete="off">
        <button id="connect-btn" class="primary-btn">Подключиться</button>
    </div>

    <!-- ================= СХЕМА 2: ИНТЕРФЕЙС ПРИЛОЖЕНИЯ ================= -->
    <div id="app-screen">
        <header>
            <div id="room-title" style="font-weight: bold;">Комната: ---</div>
            <div id="status">Подключение...</div>
        </header>

        <div class="touch-section">
            <div id="touch-pad">КОСНУТЬСЯ</div>
            <div class="modes">
                <button class="mode-btn active" data-mode="tap">Тап ⚡</button>
                <button class="mode-btn" data-mode="heartbeat">Пульс ❤️</button>
                <button class="mode-btn" data-mode="hug">Объятие 🫂</button>
            </div>
        </div>

        <div class="chat-section">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button id="send-btn">⇄</button>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8080');

        const vibrationPatterns = {
            tap: [100],
            heartbeat: [140, 100, 140, 500],
            hug: [1200]
        };

        let currentMode = 'tap';

        // Элементы экранов
        const pairingScreen = document.getElementById('pairing-screen');
        const appScreen = document.getElementById('app-screen');
        
        // Элементы управления
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const roomTitle = document.getElementById('room-title');
        const statusDiv = document.getElementById('status');
        const touchPad = document.getElementById('touch-pad');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // КЛИК "ПОДКЛЮЧИТЬСЯ"
        connectBtn.addEventListener('click', () => {
            const roomCode = roomInput.value.trim();
            if (!roomCode) return alert('Введите код!');

            if (ws.readyState === WebSocket.OPEN) {
                // Отправляем серверу запрос на вход в комнату
                ws.send(JSON.stringify({ type: 'join', room: roomCode }));
                
                // Переключаем экраны UI
                pairingScreen.style.display = 'none';
                appScreen.style.style = 'flex'; // Показываем приложение
                appScreen.style.display = 'flex';
                roomTitle.textContent = `Комната: ${roomCode}`;
            } else {
                alert('Нет соединения с сервером. Попробуйте позже.');
            }
        });

        // Переключение режимов вибрации
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.mode-btn.active').classList.remove('active');
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
            });
        });

        // ПРИЁМ ДАННЫХ ОТ СЕРВЕРА
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'system_status') {
                statusDiv.textContent = data.text;
            } else if (data.type === 'touch') {
                handleIncomingTouch(data.pattern);
            } else if (data.type === 'chat') {
                addMessage(data.text, 'partner');
            }
        };

        // ОТПРАВКА: Прикосновение
        touchPad.addEventListener('pointerdown', () => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'touch', pattern: currentMode }));
            }
        });

        // ОТПРАВКА: Чат
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'chat', text: text }));
                addMessage(text, 'me');
                chatInput.value = '';
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function handleIncomingTouch(patternType) {
            if (navigator.vibrate) navigator.vibrate(vibrationPatterns[patternType]);

            const className = `touch-${patternType}`;
            document.body.classList.add(className);
            const duration = patternType === 'hug' ? 1200 : 400;
            setTimeout(() => document.body.classList.remove(className), duration);
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', sender);
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
