<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прикосновения 2.0 💫</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; user-select: none; }
        body {
            margin: 0; padding: 10px; height: 100vh;
            background-color: #0b0b0e; color: #fff;
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; transition: background-color 0.3s ease;
        }

        /* Интерактивные вспышки */
        body.touch-tap { background-color: #00b4d8; }
        body.touch-heartbeat { background-color: #ff4d6d; }
        body.touch-hug { background-color: #7209b7; }
        body.touch-kiss { background-color: #ff758f; }
        body.touch-tickle { background-color: #ffb703; }
        body.combo-active { background-color: #38b000; }

        /* Экран сопряжения */
        #pairing-screen {
            position: fixed; inset: 0; background: #0b0b0e; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 20px;
        }
        .input-field {
            width: 100%; max-width: 280px; background: #15151f; border: 1px solid #2d2d3f; padding: 14px;
            border-radius: 14px; color: #fff; text-align: center; font-size: 1.1rem; outline: none;
        }
        .primary-btn {
            width: 100%; max-width: 280px; background: linear-gradient(135deg, #ff3366, #ff5588); border: none; padding: 14px;
            border-radius: 14px; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #15151f; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem;
            background: #15151f; padding: 4px 12px; border-radius: 20px; color: #888;
        }
        .status-badge.online { color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .status-badge .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .status-badge.online .dot { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

        /* Игровое поле с холстом */
        .interactive-zone {
            position: relative; flex-grow: 1; margin: 10px 0;
            background: linear-gradient(145deg, #101017, #07070a);
            border: 2px dashed #232336; border-radius: 24px; overflow: hidden;
        }
        #touch-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; touch-action: none; }
        
        /* Кнопка "Поймай комбо" */
        #combo-trigger-btn {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: #ff3366; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; font-size: 0.85rem; color: white;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.5); display: none; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.08); } 100% { transform: translateX(-50%) scale(1); } }

        /* Панель режимов */
        .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .mode-btn { background: #13131c; border: 1px solid #222233; color: #a0a0b0; padding: 10px 4px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; }
        .mode-btn.active { background: #ff3366; color: #fff; border-color: #ff3366; font-weight: bold; }
        .mode-btn.special { background: #7209b7; color: #fff; border-color: #7209b7; }

        /* [ФИКС СЛОЕВ]: Всплывающее уведомление НАД холстом (z-index: 9999) */
        #touch-overlay {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 15, 25, 0.95); border: 2px solid #ff3366; padding: 15px 25px;
            border-radius: 20px; font-size: 1.3rem; font-weight: bold; text-align: center;
            z-index: 9999; pointer-events: none; opacity: 0; box-shadow: 0 10px 30px rgba(255, 51, 102, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #touch-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* Панель для записи ритма */
        #rhythm-overlay {
            position: fixed; inset: 0; background: rgba(11, 11, 14, 0.95);
            z-index: 10000; display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        .rhythm-pad {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, #7209b7, #3f076b);
            box-shadow: 0 0 30px rgba(114, 9, 183, 0.6);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; color: #fff;
            border: 3px solid #ff3366;
        }
    </style>
</head>
<body>

    <div id="touch-overlay"></div>

    <div id="rhythm-overlay">
        <div class="rhythm-pad">СТУЧИ СЮДА</div>
        <p style="color: #888; font-size: 0.9rem; text-align: center; padding: 0 20px; max-width: 280px;">
            Удерживай кнопку ритма внизу и отстукивай такт на этом фиолетовом круге!
        </p>
    </div>

    <div id="pairing-screen">
        <h2 style="margin: 0; font-weight: 800; letter-spacing: 1px;">Прикосновения 2.0 💫</h2>
        <p style="color: #555566; font-size: 0.85rem; margin: 0 0 10px 0;">Создайте или введите код комнаты</p>
        <input type="text" id="room-input" class="input-field" placeholder="Код вашей комнаты" autocomplete="off">
        <button id="connect-btn" class="primary-btn">Войти в пространство</button>
    </div>

    <header>
        <div>
            <div id="room-title" style="font-weight: bold; font-size: 0.9rem; color: #888;">Комната: ---</div>
            <div id="status-badge" class="status-badge"><div class="dot"></div> <span id="status-text">Синхронизация...</span></div>
        </div>
        <div style="font-size: 0.75rem; color: #ff3366; font-weight: bold; letter-spacing: 0.5px;">КОМБО РЕЖИМ ⚡</div>
    </header>

    <div class="interactive-zone" id="zone">
        <button id="combo-trigger-btn">ПОЙМАТЬ КАСАНИЕ 🤝</button>
        <canvas id="touch-canvas"></canvas>
    </div>

    <div class="modes">
        <button class="mode-btn active" data-mode="tap">Тап ⚡</button>
        <button class="mode-btn" data-mode="heartbeat">Пульс ❤️</button>
        <button class="mode-btn" data-mode="hug">Объятие 🫂</button>
        <button class="mode-btn" data-mode="kiss">Поцелуй 💋</button>
        <button class="mode-btn" data-mode="draw">Рисование 🎨</button>
        <button class="mode-btn special" id="rhythm-btn">Запись Ритма 🥁</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const ws = new WebSocket('wss://touch-server-emiy.onrender.com');

        // Элементы UI
        const pairingScreen = document.getElementById('pairing-screen');
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const roomTitle = document.getElementById('room-title');
        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const canvas = document.getElementById('touch-canvas');
        const ctx = canvas.getContext('2d');
        const comboBtn = document.getElementById('combo-trigger-btn');
        const touchOverlay = document.getElementById('touch-overlay');
        const rhythmBtn = document.getElementById('rhythm-btn');
        const rhythmOverlay = document.getElementById('rhythm-overlay');
        const rhythmPad = document.querySelector('.rhythm-pad');

        let currentMode = 'tap';
        let isDrawing = false;
        let comboActiveByPartner = false;
        let comboTimeout = null;

        let isRecordingRhythm = false;
        let rhythmStartTime = 0;
        let recordedTaps = [];

        // Тексты для всплывающих надписей
        const overlayTexts = {
            tap: "Тык! ⚡", 
            heartbeat: "Тук-тук... Стук сердца ❤️",
            hug: "Вас крепко обняли! 🫂", 
            kiss: "Сладкий поцелуй! 💋",
            combo: "ИДЕАЛЬНОЕ СОВПАДЕНИЕ! 💚🌟", 
            custom: "Вам прислали личный ритм! 🥁"
        };

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            roomInput.value = decodeURIComponent(tg.initDataUnsafe.start_param);
            ws.onopen = () => { startApp(roomInput.value.trim()); };
        } else {
            const savedRoom = localStorage.getItem('tg_room_code_v2');
            if (savedRoom) roomInput.value = savedRoom;
        }

        connectBtn.addEventListener('click', () => {
            const code = roomInput.value.trim();
            if (!code) return alert('Введите код!');
            startApp(code);
        });

        function startApp(roomCode) {
            localStorage.setItem('tg_room_code_v2', roomCode);
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'join', room: roomCode }));
            pairingScreen.style.display = 'none';
            resizeCanvas();
        }

        document.querySelectorAll('.mode-btn:not(.special)').forEach(btn => {
            btn.addEventListener('click', () => {
                const activeBtn = document.querySelector('.mode-btn.active');
                if (activeBtn) activeBtn.classList.remove('active');
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        // ================= ЭКСТРЕМАЛЬНАЯ ВИБРАЦИЯ ДЛЯ IPHONE =================
        function triggerHaptic(mode) {
            if (!tg || !tg.HapticFeedback) return;
            try {
                if (mode === 'tap') {
                    tg.HapticFeedback.impactOccurred('heavy');
                    tg.HapticFeedback.impactOccurred('rigid');
                    tg.HapticFeedback.impactOccurred('heavy');
                } else if (mode === 'heartbeat') {
                    tg.HapticFeedback.notificationOccurred('warning');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning'); }, 180);
                } else if (mode === 'hug') {
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); }, 100);
                } else if (mode === 'kiss') {
                    tg.HapticFeedback.impactOccurred('heavy');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }, 80);
                } else if (mode === 'combo') {
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }, 200);
                } else if (mode === 'draw_vibe') {
                    tg.HapticFeedback.impactOccurred('soft');
                }
            } catch(e) {}
        }

        function playCustomRhythm(taps) {
            if (taps.length === 0) return;
            showOverlay('custom');
            taps.forEach(delay => {
                setTimeout(() => {
                    triggerHaptic('tap');
                    drawCircle(canvas.width / 2, canvas.height / 2, '#7209b7');
                }, delay);
            });
        }

        // Показ всплывающего текста по центру экрана
        function showOverlay(type) {
            if (overlayTexts[type]) {
                touchOverlay.textContent = overlayTexts[type];
                touchOverlay.classList.add('show');
                setTimeout(() => touchOverlay.classList.remove('show'), 1400);
            }
        }

        function drawCircle(x, y, color) {
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.6;
            ctx.fill();
            ctx.globalAlpha = 1.0;
            setTimeout(() => { ctx.clearRect(x - 50, y - 50, 100, 100); }, 400);
        }

        // ================= ОБРАБОТКА НАЖАТИЙ НА ЭКРАН =================
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentMode === 'draw') {
                isDrawing = true;
                sendNetData({ type: 'draw_start', x, y });
                ctx.beginPath(); ctx.moveTo(x, y);
                ctx.strokeStyle = '#ff3366'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            } else {
                sendNetData({ type: 'touch', pattern: currentMode, x, y });
                drawCircle(x, y, '#00b4d8');
                sendNetData({ type: 'combo_window_open' });
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing || currentMode !== 'draw') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            sendNetData({ type: 'draw_move', x, y });
            triggerHaptic('draw_vibe');
        });

        canvas.addEventListener('pointerup', () => {
            if (currentMode === 'draw') {
                isDrawing = false;
                sendNetData({ type: 'draw_end' });
            }
        });

        comboBtn.addEventListener('click', () => {
            if (comboActiveByPartner) {
                sendNetData({ type: 'combo_match_success' });
                handleComboSuccess();
            }
        });

        function handleComboSuccess() {
            comboBtn.style.display = 'none';
            comboActiveByPartner = false;
            document.body.classList.add('combo-active');
            showOverlay('combo');
            triggerHaptic('combo');
            setTimeout(() => document.body.classList.remove('combo-active'), 1500);
        }

        // ================= ИСПРАВЛЕННАЯ ЗАПИСЬ РИТМА =================
        rhythmBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            isRecordingRhythm = true;
            rhythmStartTime = Date.now();
            recordedTaps = [];
            rhythmBtn.textContent = "🔴 Запись идёт...";
            rhythmOverlay.style.display = 'flex';
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        rhythmPad.addEventListener('pointerdown', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (!isRecordingRhythm) return;
            const offset = Date.now() - rhythmStartTime;
            recordedTaps.push(offset);
            triggerHaptic('tap');
        });

        rhythmBtn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (!isRecordingRhythm) return;
            isRecordingRhythm = false;
            rhythmBtn.textContent = "Запись Ритма 🥁";
            rhythmOverlay.style.display = 'none';
            if (recordedTaps.length > 0) {
                sendNetData({ type: 'custom_rhythm', taps: recordedTaps });
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        });

        rhythmBtn.addEventListener('pointerleave', (e) => {
            if (isRecordingRhythm) {
                isRecordingRhythm = false;
                rhythmBtn.textContent = "Запись Ритма 🥁";
                rhythmOverlay.style.display = 'none';
                if (recordedTaps.length > 0) {
                    sendNetData({ type: 'custom_rhythm', taps: recordedTaps });
                }
            }
        });

        // ================= ПРИЕМ ДАННЫХ ИЗ СЕТИ =================
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'system_status') {
                if (data.text.includes('2')) {
                    badge.classList.add('online'); statusText.textContent = 'В сети';
                } else {
                    badge.classList.remove('online'); statusText.textContent = 'Поиск...';
                }
            } 
            else if (data.type === 'touch') {
                triggerHaptic(data.pattern);
                showOverlay(data.pattern); // [РАБОТАЕТ!]: Всплывающая надпись на событие партнера
                drawCircle(data.x || canvas.width/2, data.y || canvas.height/2, '#ff4d6d');
                
                const className = "touch-" + data.pattern;
                document.body.classList.add(className);
                setTimeout(() => document.body.classList.remove(className), 500);
            }
            else if (data.type === 'draw_start') {
                ctx.beginPath(); ctx.moveTo(data.x, data.y);
                ctx.strokeStyle = '#00b4d8'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            } else if (data.type === 'draw_move') {
                ctx.lineTo(data.x, data.y); ctx.stroke();
                triggerHaptic('draw_vibe');
            } else if (data.type === 'draw_end') {
                setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 1000);
            }
            else if (data.type === 'combo_window_open') {
                comboActiveByPartner = true;
                comboBtn.style.display = 'block';
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => {
                    comboBtn.style.display = 'none';
                    comboActiveByPartner = false;
                }, 1500);
            } else if (data.type === 'combo_match_success') {
                handleComboSuccess();
            }
            else if (data.type === 'custom_rhythm') {
                playCustomRhythm(data.taps);
            }
        };

        function sendNetData(obj) {
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
        }
    </script>
</body>
    </html>
