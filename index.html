<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прикосновения в Telegram 💫</title>
    <!-- Официальная библиотека Telegram Web Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body {
            margin: 0; padding: 15px; height: 100vh;
            background-color: #0f0f12; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; transition: background-color 0.4s ease;
        }

        /* Анимации вспышек фона при касаниях */
        body.touch-tap { background-color: #00b4d8; }
        body.touch-heartbeat { background-color: #ff4d6d; }
        body.touch-hug { background-color: #7209b7; }
        body.touch-kiss { background-color: #ff758f; }
        body.touch-tickle { background-color: #ffb703; }

        /* Экран сопряжения */
        #pairing-screen {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            text-align: center; width: 100%; max-width: 320px;
        }
        .input-field {
            width: 100%; background: #1a1a24; border: 1px solid #333344; padding: 14px;
            border-radius: 12px; color: #fff; text-align: center; font-size: 1.1rem; outline: none;
        }
        .primary-btn {
            width: 100%; background: linear-gradient(135deg, #ff3366, #ff5588); border: none; padding: 14px;
            border-radius: 12px; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        /* Главный экран приложения */
        #app-screen {
            display: none; flex-direction: column; justify-content: space-between;
            width: 100%; height: 100%; max-width: 450px;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a24; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem;
            background: #1a1a24; padding: 4px 12px; border-radius: 20px; color: #888;
        }
        .status-badge.online { color: #4caf50; background: rgba(76, 175, 80, 0.1); }
        .status-badge .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .status-badge.online .dot { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

        /* Зона кнопки тапа */
        .touch-section { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 20px 0; }
        .pad-container { position: relative; width: 170px; height: 170px; }
        
        #touch-pad {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(145deg, #222232, #11111a);
            border: 3px solid #ff3366; display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent; z-index: 2; position: relative;
        }
        
        .wave { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid #ff3366; border-radius: 50%; opacity: 0; z-index: 1; }
        .animate-wave { animation: ripple 0.6s cubic-bezier(0.1, 0.8, 0.3, 1); }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        /* Кнопки переключения режимов */
        .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; padding: 0 10px; }
        .mode-btn { background: #161622; border: 1px solid #2d2d3f; color: #a0a0b0; padding: 8px 4px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; }
        .mode-btn.active { background: #ff3366; color: #fff; border-color: #ff3366; font-weight: bold; }

        /* Чат */
        .chat-section { background: #14141f; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; height: 32vh; border: 1px solid #1e1e2f; }
        #chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 8px 14px; border-radius: 16px; max-width: 80%; word-break: break-word; font-size: 0.9rem; }
        .msg.me { background: #252538; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.partner { background: #ff3366; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #typing-indicator { font-size: 0.75rem; color: #ff5588; height: 15px; margin-left: 5px; margin-bottom: 4px; font-style: italic; opacity: 0; }
        .chat-input-area { display: flex; gap: 8px; }
        #chat-input { flex-grow: 1; background: #1e1e2e; border: 1px solid #2d2d3f; padding: 12px; border-radius: 12px; color: #fff; outline: none; }
        #send-btn { background: #ff3366; border: none; padding: 0 16px; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: СОПРЯЖЕНИЕ -->
    <div id="pairing-screen">
        <h2 style="margin-bottom: 5px; font-weight: 800;">Прикосновения 💫</h2>
        <p style="color: #6c6c80; font-size: 0.85rem; margin-bottom: 10px;">Придумайте секретный код комнаты</p>
        <input type="text" id="room-input" class="input-field" placeholder="Например: Пара2026" autocomplete="off">
        <button id="connect-btn" class="primary-btn">Войти в комнату</button>
    </div>

    <!-- ЭКРАН 2: ИНТЕРФЕЙС -->
    <div id="app-screen">
        <header>
            <div style="text-align: left;">
                <div id="room-title" style="font-weight: bold; font-size: 0.95rem; color: #a0a0b0;">Комната: ---</div>
                <div id="status-badge" class="status-badge"><div class="dot"></div> <span id="status-text">Поиск...</span></div>
            </div>
            <div style="font-size: 0.8rem; color: #6c6c80;">Telegram Mode</div>
        </header>

        <div class="touch-section">
            <div class="pad-container">
                <div id="wave-effect" class="wave"></div>
                <div id="touch-pad">КОСНУТЬСЯ</div>
            </div>
            
            <div class="modes">
                <button class="mode-btn active" data-mode="tap">Тап ⚡</button>
                <button class="mode-btn" data-mode="heartbeat">Пульс ❤️</button>
                <button class="mode-btn" data-mode="hug">Объятие 🫂</button>
                <button class="mode-btn" data-mode="kiss">Поцелуй 💋</button>
                <button class="mode-btn" data-mode="tickle">Щекотка 🌀</button>
            </div>
        </div>

        <div class="chat-section">
            <div id="chat-messages"></div>
            <div id="typing-indicator">партнёр что-то пишет...</div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Напишите..." autocomplete="off">
                <button id="send-btn">⇄</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp и растягиваем на весь экран
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // Подключение к вашему бэкенду на Render
        const ws = new WebSocket('wss://touch-server-emiy.onrender.com');
        const soundFreqs = { tap: 600, heartbeat: 150, hug: 250, kiss: 500, tickle: 700 };
        let currentMode = 'tap';
        let typingTimeout = null;

        // Элементы UI
        const pairingScreen = document.getElementById('pairing-screen');
        const appScreen = document.getElementById('app-screen');
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const roomTitle = document.getElementById('room-title');
        const badge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const touchPad = document.getElementById('touch-pad');
        const waveEffect = document.getElementById('wave-effect');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Проверяем, запущен ли бот по реферальной ссылке с кодом комнаты
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            roomInput.value = decodeURIComponent(tg.initDataUnsafe.start_param);
            ws.onopen = () => { startApp(roomInput.value.trim()); };
        } else {
            const savedRoom = localStorage.getItem('tg_room_code');
            if (savedRoom) roomInput.value = savedRoom;
        }

        function startApp(roomCode) {
            localStorage.setItem('tg_room_code', roomCode);
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'join', room: roomCode }));
            }
            pairingScreen.style.display = 'none';
            appScreen.style.display = 'flex';
            roomTitle.textContent = "Комната: " + roomCode;
        }

        connectBtn.addEventListener('click', () => {
            const roomCode = roomInput.value.trim();
            if (!roomCode) return alert('Введите код!');
            if (ws.readyState === WebSocket.OPEN) {
                startApp(roomCode);
            } else {
                alert('Сервер просыпается, подождите 10 секунд и нажмите еще раз.');
            }
        });

        // Функция нативной вибрации Telegram WebApp (работает на iOS)
        function triggerTelegramHaptic(mode) {
            if (!tg || !tg.HapticFeedback) return;
            
            try {
                if (mode === 'tap') {
                    tg.HapticFeedback.impactOccurred('medium');
                } else if (mode === 'heartbeat') {
                    tg.HapticFeedback.impactOccurred('heavy');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }, 140);
                } else if (mode === 'hug') {
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (mode === 'kiss') {
                    tg.HapticFeedback.impactOccurred('light');
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }, 120);
                    setTimeout(() => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); }, 240);
                } else if (mode === 'tickle') {
                    let count = 0;
                    const interval = setInterval(() => {
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                        if (++count >= 6) clearInterval(interval);
                    }, 80);
                }
            } catch (e) { console.error(e); }
        }

        function playTouchSound(mode) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); 
                const gain = ctx.createGain();
                osc.type = mode === 'heartbeat' ? 'triangle' : 'sine';
                osc.frequency.setValueAtTime(soundFreqs[mode] || 400, ctx.currentTime);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain); 
                gain.connect(ctx.destination);
                osc.start(); 
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const activeBtn = document.querySelector('.mode-btn.active');
                if (activeBtn) activeBtn.classList.remove('active');
                btn.classList.add('active'); 
                currentMode = btn.dataset.mode;
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'system_status') {
                    if (data.text.includes('подключился') || data.text.includes('Участников: 2')) {
                        badge.classList.add('online'); 
                        statusText.textContent = 'В сети';
                    } else {
                        badge.classList.remove('online'); 
                        statusText.textContent = 'Поиск...';
                    }
                } else if (data.type === 'touch') {
                    handleIncomingTouch(data.pattern);
                } else if (data.type === 'chat') {
                    addMessage(data.text, 'partner');
                } else if (data.type === 'typing') {
                    typingIndicator.style.opacity = data.isTyping ? '1' : '0';
                }
            } catch(e) { console.error(e); }
        };

        touchPad.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'touch', pattern: currentMode }));
                waveEffect.classList.remove('animate-wave'); 
                void waveEffect.offsetWidth; 
                waveEffect.classList.add('animate-wave');
                triggerTelegramHaptic(currentMode);
                playTouchSound(currentMode);
            }
        });

        chatInput.addEventListener('input', () => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'typing', isTyping: true }));
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { 
                    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'typing', isTyping: false })); 
                }, 1500);
            }
        });

        function sendMessage() {
            const text = chatInput.value.trim(); 
            if (!text) return;
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'chat', text: text }));
                ws.send(JSON.stringify({ type: 'typing', isTyping: false }));
                addMessage(text, 'me'); 
                chatInput.value = '';
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function handleIncomingTouch(patternType) {
            triggerTelegramHaptic(patternType);
            playTouchSound(patternType);
            const className = "touch-" + patternType;
            document.body.classList.add(className);
            const duration = (patternType === 'hug' || patternType === 'tickle') ? 1200 : 500;
            setTimeout(() => document.body.classList.remove(className), duration);
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div'); 
            msgDiv.classList.add('msg', sender); 
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv); 
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
                  </html>
